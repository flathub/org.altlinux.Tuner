app-id: org.altlinux.Tuner
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: tuner
add-extensions:
  org.altlinux.Tuner.Plugin:
    directory: extensions
    merge-dirs: lib/tuner/plugins;share
    subdirectories: true
    no-autodownload: true
    autodelete: true

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --talk-name=ca.desrt.dconf
  - --filesystem=xdg-run/dconf
  - --filesystem=xdg-config/dconf
  - --filesystem=host-os:ro
  - --env=GIO_EXTRA_MODULES=/app/lib/gio/modules
  - --device=dri

cleanup:
 - /include
 - /lib/girepository-1.0
 - /lib/pkgconfig
 - /share/vala

modules:
  - name: dconf
    buildsystem: meson
    config-opts:
      - -Dbash_completion=false
      - -Dman=false
    cleanup:
      - /include
      - /lib/pkgconfig
      - /libexec
      - /share/dbus-1
    sources:
      - type: archive
        url: https://download.gnome.org/sources/dconf/0.49/dconf-0.49.0.tar.xz
        sha256: 16a47e49a58156dbb96578e1708325299e4c19eea9be128d5bd12fd0963d6c36

      - type: patch
        path: dconf-override.patch

  - name: libpeas
    buildsystem: meson
    config-opts:
      - -Dlua51=false
      - -Dpython3=true
      - -Dvapi=true
    sources:
      - type: git
        url: https://gitlab.gnome.org/GNOME/libpeas.git
        tag: 2.2.1
        commit: 744430715e619069b3fcb6c994f2c09257700d05

  - name: tuner
    builddir: true
    buildsystem: meson
    sources:
      - type: git
        url: https://altlinux.space/alt-gnome/Tuner.git
        tag: 0.6.7
        commit: 6176491fc7d0866bf434e6b89e0e36e2ba6cc424
    post-install:
      - install -d /app/extensions

  - name: gnome-desktop
    buildsystem: meson
    cleanup:
      - /include
      - /lib/girepository-1.0
      - /lib/pkgconfig
      - /share/gir-1.0
    config-opts:
      - -Ddesktop_docs=false
      - -Dlegacy_library=false
      - -Ddebug_tools=false
      - -Dudev=disabled
    sources:
      - type: git
        url: https://gitlab.gnome.org/GNOME/gnome-desktop.git
        tag: '44.5'
        commit: c214a5f3ff96d6add49bd88372c0c449bcab1967

  - name: tuner-tweaks
    builddir: true
    buildsystem: meson
    cleanup:
      - /share/metainfo
    sources:
      - type: git
        url: https://altlinux.space/alt-gnome/TunerTweaks.git
        tag: 0.5.3
        commit: ff5461ed034adfd0851238f4edcdf596c5210d77
